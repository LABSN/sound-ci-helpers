name: 'Test'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  job:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-26.04-arm
          - ubuntu-24.04-arm
          - ubuntu-26.04
          - ubuntu-24.04
          - ubuntu-22.04
          - windows-2025
          - windows-2022
          - macos-26
          - macos-26-intel
          - macos-15
          - macos-15-intel
          - macos-14
    defaults:
      run:
        shell: bash -e {0}
    steps:
      - uses: actions/checkout@v7
      - uses: ./
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install sounddevice
      - run: python -m sounddevice
      - run: |
          set -xeo pipefail
          python -m sounddevice | grep "[82] out"
        name: Check that there is some output device
      - run: sleep 10
      - run: |
          set -xeo pipefail
          python -m sounddevice | grep "[82] out"
        name: Check that there is some output device after sleep
